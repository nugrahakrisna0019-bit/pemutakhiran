<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemutakhiran Data BOO — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222638;
  --border: #2e3347;
  --accent: #4f7fff;
  --accent2: #7b61ff;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --text: #e8eaf6;
  --muted: #8892b0;
  --mono: 'DM Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #0d1240 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.logo-text h1 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.logo-text p {
  font-size: 12px;
  color: var(--muted);
}
.header-badge {
  background: rgba(79,127,255,0.15);
  border: 1px solid rgba(79,127,255,0.3);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}

/* MAIN */
main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 40px;
}

/* SUMMARY CARDS */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  transition: transform 0.2s, border-color 0.2s;
  cursor: pointer;
}
.summary-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
}
.summary-card.active {
  border-color: var(--accent);
  background: rgba(79,127,255,0.08);
}
.summary-card .num {
  font-size: 32px;
  font-weight: 800;
  font-family: var(--mono);
  color: var(--accent);
  line-height: 1;
}
.summary-card .label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 6px;
  font-weight: 600;
}
.summary-card .sublabel {
  font-size: 12px;
  color: var(--text);
  margin-top: 4px;
  font-weight: 500;
}

/* SECTION TITLE */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.section-title {
  font-size: 20px;
  font-weight: 700;
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.tab-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.tab-btn:hover { color: var(--text); border-color: var(--accent); }
.tab-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.tab-count {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 11px;
  margin-left: 4px;
}

/* CONTROLS */
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--muted); }
select.filter-sel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
select.filter-sel:focus { border-color: var(--accent); }

/* TABLE */
.table-wrap {
  overflow-x: auto;
  border-radius: 14px;
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  background: var(--surface2);
  padding: 12px 16px;
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
tbody tr:hover { background: rgba(79,127,255,0.05); }
tbody tr:last-child { border-bottom: none; }
td {
  padding: 12px 16px;
  vertical-align: middle;
}
.emp-name {
  font-weight: 600;
  color: var(--text);
}
.emp-id {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

/* BADGES */
.badge {
  display: inline-block;
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-green { background: rgba(34,197,94,0.12); color: var(--green); }
.badge-yellow { background: rgba(245,158,11,0.12); color: var(--yellow); }
.badge-red { background: rgba(239,68,68,0.12); color: var(--red); }
.badge-blue { background: rgba(79,127,255,0.12); color: var(--accent); }
.badge-gray { background: rgba(136,146,176,0.12); color: var(--muted); }

/* STATUS OVERALL */
.status-ok { color: var(--green); font-weight: 700; }
.status-bad { color: var(--red); font-weight: 700; }

/* PAGINATION */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-info { font-size: 13px; color: var(--muted); }
.page-btns { display: flex; gap: 6px; }
.page-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
.page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* STAT BARS */
.stat-bars {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.stat-bar-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}
.stat-bar-card h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 14px;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.bar-label { font-size: 12px; color: var(--muted); width: 180px; flex-shrink: 0; }
.bar-track {
  flex: 1;
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.bar-val { font-size: 12px; font-family: var(--mono); color: var(--text); width: 30px; text-align: right; }

/* EMPTY */
.empty { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

@media (max-width: 768px) {
  header { padding: 16px 20px; }
  main { padding: 20px; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<header>

    <div class="logo-text">
      <h1>Pemutakhiran Data BOO</h1>

  <!-- Table -->
  <div class="table-wrap">

      <thead>

  </div>
  <div class="empty" id="emptyMsg" style="display:none">Tidak ada data yang sesuai filter.</div>

  <!-- Pagination -->
  <div class="pagination">
    <div class="page-info" id="pageInfo"></div>
    <div class="page-btns" id="pageBtns"></div>
  </div>
</main>

const SHEET_LABELS = {
  'OUTB': 'Outbound',
  'INB': 'Inbound',
  'CS': 'Customer Service',
  'IT': 'IT',
  'SALES-MKT': 'Sales & Marketing',
  'FIN-ACC': 'Finance & Accounting',
  'HC-GA': 'HC & GA',
  'BPS': 'BPS'
};

const STATUS_COLORS = {
  'LENGKAP': 'badge-green',
  'LENGKAP DOKUMEN': 'badge-green',
  'ADA NO.KTP, TIDAK ADA SCAN': 'badge-yellow',
  'ADA NO.KK, TIDAK ADA SCAN': 'badge-yellow',
  'ADA NO.NPWP, TIDAK ADA SCAN': 'badge-yellow',
  'TIDAK ADA NO. & SCAN KTP': 'badge-red',
  'TIDAK ADA NO. & SCAN KK': 'badge-red',
  'TIDAK ADA NO. & SCAN NPWP': 'badge-red',
  'TIDAK LENGKAP': 'badge-red',
  'ADA EMAIL': 'badge-blue',
  'TIDAK ADA EMAIL': 'badge-red',
};

let currentSheet = 'ALL';
let currentPage = 1;
const PAGE_SIZE = 25;

function getAllData() {
  return Object.values(ALL_DATA).flat();
}

function getSheetData(sheet) {
  if (sheet === 'ALL') return getAllData();
  return ALL_DATA[sheet] || [];
}

function countStatus(arr, field, val) {
  return arr.filter(r => r[field] === val).length;
}

function badge(text) {
  const cls = STATUS_COLORS[text] || 'badge-gray';
  const short = text
    .replace('TIDAK ADA NO. & SCAN ', '✗ Tidak Ada')
    .replace('ADA NO.', '~ No. ')
    .replace(', TIDAK ADA SCAN', '')
    .replace('LENGKAP DOKUMEN', '✓ Lengkap')
    .replace('LENGKAP', '✓ Lengkap')
    .replace('TIDAK LENGKAP', '✗ Belum')
    .replace('ADA EMAIL', '✓ Ada')
    .replace('TIDAK ADA EMAIL', '✗ Tidak Ada');
  return `<span class="badge ${cls}">${short}</span>`;
}

function renderSummary() {
  const cards = document.getElementById('summaryCards');
  const total = getAllData().length;
  document.getElementById('totalBadge').textContent = total + ' Karyawan';

  let html = `<div class="summary-card ${currentSheet==='ALL'?'active':''}" onclick="switchSheet('ALL')">
    <div class="num">${total}</div>
    <div class="label">Total</div>
    <div class="sublabel">Semua Departemen</div>
  </div>`;

  for (const [key, rows] of Object.entries(ALL_DATA)) {
    const lengkap = countStatus(rows, 'STATUS', 'LENGKAP DOKUMEN');
    html += `<div class="summary-card ${currentSheet===key?'active':''}" onclick="switchSheet('${key}')">
      <div class="num">${rows.length}</div>
      <div class="label">${SHEET_LABELS[key] || key}</div>
      <div class="sublabel" style="color:${lengkap>0?'var(--green)':'var(--muted)'}">${lengkap} Lengkap</div>
    </div>`;
  }
  cards.innerHTML = html;
}

function renderStatBars() {
  const rows = getSheetData(currentSheet);
  const total = rows.length;
  if (!total) return;

  function pct(n) { return Math.round(n/total*100); }
  function bar(label, n, color) {
    const p = pct(n);
    return `<div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${color}"></div></div>
      <div class="bar-val">${n}</div>
    </div>`;
  }

  const ktpLengkap = countStatus(rows, 'STATUS KTP', 'LENGKAP');
  const ktpPartial = countStatus(rows, 'STATUS KTP', 'ADA NO.KTP, TIDAK ADA SCAN');
  const ktpNone = countStatus(rows, 'STATUS KTP', 'TIDAK ADA NO. & SCAN KTP');

  const kkLengkap = countStatus(rows, 'STATUS KK', 'LENGKAP');
  const kkPartial = countStatus(rows, 'STATUS KK', 'ADA NO.KK, TIDAK ADA SCAN');
  const kkNone = countStatus(rows, 'STATUS KK', 'TIDAK ADA NO. & SCAN KK');

  const npwpLengkap = countStatus(rows, 'STATUS NPWP', 'LENGKAP');
  const npwpPartial = countStatus(rows, 'STATUS NPWP', 'ADA NO.NPWP, TIDAK ADA SCAN');
  const npwpNone = countStatus(rows, 'STATUS NPWP', 'TIDAK ADA NO. & SCAN NPWP');

  const emailAda = countStatus(rows, 'STATUS EMAIL', 'ADA EMAIL');
  const docLengkap = countStatus(rows, 'STATUS', 'LENGKAP DOKUMEN');

  document.getElementById('statBars').innerHTML = `
    <div class="stat-bar-card">
      <h3>Status KTP</h3>
      ${bar('Lengkap', ktpLengkap, 'var(--green)')}
      ${bar('Ada No, Tanpa Scan', ktpPartial, 'var(--yellow)')}
      ${bar('Tidak Ada', ktpNone, 'var(--red)')}
    </div>
    <div class="stat-bar-card">
      <h3>Status Kartu Keluarga</h3>
      ${bar('Lengkap', kkLengkap, 'var(--green)')}
      ${bar('Ada No, Tanpa Scan', kkPartial, 'var(--yellow)')}
      ${bar('Tidak Ada', kkNone, 'var(--red)')}
    </div>
    <div class="stat-bar-card">
      <h3>Status NPWP</h3>
      ${bar('Lengkap', npwpLengkap, 'var(--green)')}
      ${bar('Ada No, Tanpa Scan', npwpPartial, 'var(--yellow)')}
      ${bar('Tidak Ada', npwpNone, 'var(--red)')}
    </div>
    <div class="stat-bar-card">
      <h3>Ringkasan Dokumen</h3>
      ${bar('Dokumen Lengkap', docLengkap, 'var(--green)')}
      ${bar('Ada Email', emailAda, 'var(--accent)')}
      ${bar('Belum Lengkap', total - docLengkap, 'var(--red)')}
    </div>
  `;
}

function getFilteredData() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const statusF = document.getElementById('filterStatus').value;
  const ktpF = document.getElementById('filterKTP').value;
  let rows = getSheetData(currentSheet);
  if (search) rows = rows.filter(r =>
    (r['Employee Name'] || '').toLowerCase().includes(search) ||
    (r['Employee ID'] || '').toLowerCase().includes(search)
  );
  if (statusF) rows = rows.filter(r => r['STATUS'] === statusF);
  if (ktpF) rows = rows.filter(r => r['STATUS KTP'] === ktpF);
  return rows;
}

function renderTable() {
  const filtered = getFilteredData();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('tableCount').textContent =
    total === getSheetData(currentSheet).length
      ? `${total} karyawan`
      : `${total} dari ${getSheetData(currentSheet).length} karyawan`;

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');

  if (!page.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = page.map(r => `
      <tr>
        <td>
          <div class="emp-name">${r['Employee Name'] || '-'}</div>
          <div class="emp-id">${r['Employee ID'] || '-'}</div>
        </td>
        <td style="color:var(--muted);font-size:12px">${r['DEPT / UNIT'] || '-'}</td>
        <td style="font-size:12px">${r['Employment Type'] || '-'}</td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--muted)">${r['Join Date'] || '-'}</td>
        <td>${badge(r['STATUS KTP'] || '-')}</td>
        <td>${badge(r['STATUS KK'] || '-')}</td>
        <td>${badge(r['STATUS NPWP'] || '-')}</td>
        <td>${badge(r['STATUS EMAIL'] || '-')}</td>
        <td>${r['STATUS'] === 'LENGKAP DOKUMEN'
          ? '<span class="status-ok">✓ Lengkap</span>'
          : '<span class="status-bad">✗ Belum</span>'}</td>
      </tr>
    `).join('');
  }

  // Page info
  document.getElementById('pageInfo').textContent =
    `Halaman ${currentPage} dari ${totalPages} (menampilkan ${start+1}–${Math.min(start+PAGE_SIZE, total)} dari ${total})`;

  // Pagination buttons
  const pageBtns = document.getElementById('pageBtns');
  let btnHtml = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
  const startP = Math.max(1, currentPage - 2);
  const endP = Math.min(totalPages, currentPage + 2);
  for (let i = startP; i <= endP; i++) {
    btnHtml += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  btnHtml += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next ›</button>`;
  pageBtns.innerHTML = btnHtml;
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  let html = `<button class="tab-btn ${currentSheet==='ALL'?'active':''}" onclick="switchSheet('ALL')">
    Semua <span class="tab-count">${getAllData().length}</span>
  </button>`;
  for (const [key, rows] of Object.entries(ALL_DATA)) {
    html += `<button class="tab-btn ${currentSheet===key?'active':''}" onclick="switchSheet('${key}')">
      ${SHEET_LABELS[key] || key} <span class="tab-count">${rows.length}</span>
    </button>`;
  }
  tabs.innerHTML = html;
}

function switchSheet(sheet) {
  currentSheet = sheet;
  currentPage = 1;
  document.getElementById('searchInput').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterKTP').value = '';
  renderSummary();
  renderStatBars();
  renderTabs();
  renderTable();
}

function goPage(p) {
  const filtered = getFilteredData();
  const total = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
}

// Events
document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderTable(); });
document.getElementById('filterStatus').addEventListener('change', () => { currentPage = 1; renderTable(); });
document.getElementById('filterKTP').addEventListener('change', () => { currentPage = 1; renderTable(); });

// Init
renderSummary();
renderStatBars();
renderTabs();
renderTable();
</script>
</body>
</html>
